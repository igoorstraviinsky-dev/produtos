        s3_key_bronze:
          type: string
          nullable: true
        silverImageKey:
          type: string
          nullable: true
        s3_key_silver:
          type: string
          nullable: true
        supplierCode:
          type: string
          nullable: true
        supplier_code:
          type: string
          nullable: true
        supplierId:
          type: string
          nullable: true
        supplier_id:
          type: string
          nullable: true
        supplierName:
          type: string
          nullable: true
        supplier_name:
          type: string
          nullable: true
        supplierProductSku:
          type: string
          nullable: true
        supplier_product_sku:
          type: string
          nullable: true
        fiscalCode:
          type: string
          nullable: true
        fiscal_code:
          type: string
          nullable: true
        categoryId:
          type: string
          nullable: true
        category_id:
          type: string
          nullable: true
        productType:
          type: string
          nullable: true
        tipo:
          type: string
          nullable: true
        typeId:
          type: string
          nullable: true
        type_id:
          type: string
          nullable: true
        subcategoryId:
          type: string
          nullable: true
        subcategory_id:
          type: string
          nullable: true
        blingProductId:
          type: string
          nullable: true
        bling_product_id:
          type: string
          nullable: true
        blingLastSyncAt:
          type: string
          format: date-time
          nullable: true
        bling_last_sync_at:
          type: string
          format: date-time
          nullable: true
        laborRateId:
          type: string
          nullable: true
        labor_rate_id:
          type: string
          nullable: true
        laborRateLabel:
          type: string
          nullable: true
        labor_rate_label:
          type: string
          nullable: true
        laborCost:
