          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
        costFinal:
          type: number
        costBreakdown:
          $ref: '#/components/schemas/ProductCostBreakdown'
    CompanyScopedProduct:
      allOf:
        - $ref: '#/components/schemas/Product'
        - type: object
          required:
            - master_stock
            - masterStock
            - custom_stock_quantity
            - customStockQuantity
            - variant_stock_quantity_total
