      properties:
        variant_id:
          type: string
        variantId:
          type: string
        product_id:
          type: string
        productId:
          type: string
        sku:
          type: string
        individual_weight:
          oneOf:
            - type: string
            - type: number
          nullable: true
        individualWeight:
          oneOf:
            - type: string
            - type: number
          nullable: true
        individual_stock:
          type: integer
        individualStock:
          type: integer
        size_labels:
          type: array
          items:
            type: string
        sizeLabels:
          type: array
          items:
            type: string
        color_labels:
          type: array
          items:
            type: string
        colorLabels:
          type: array
          items:
            type: string
        options:
          type: array
          items:
            $ref: '#/components/schemas/ProductVariantOption'
        created_at:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
        cost:
          type: number
          nullable: true
        stock_weight_grams:
          type: number
        stockWeightGrams:
          type: number
        stock_units:
          type: number
        stockUnits:
          type: number
    CompanyScopedProductVariant:
      allOf:
        - $ref: '#/components/schemas/ProductVariant'
        - type: object
          required:
            - master_stock
            - masterStock
            - custom_stock_quantity
            - customStockQuantity
            - effective_stock_quantity
            - effectiveStockQuantity
          properties:
            master_stock:
              type: number
            masterStock:
              type: number
            custom_stock_quantity:
              type: number
              nullable: true
            customStockQuantity:
              type: number
              nullable: true
            effective_stock_quantity:
              type: number
            effectiveStockQuantity:
