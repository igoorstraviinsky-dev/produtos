openapi: 3.1.0
info:
  title: B2B Stock Gateway API
  version: 0.2.0
servers:
  - url: http://localhost:3000
paths:
  /api/v1/products:
    get:
      summary: List products for an authenticated B2B company
      tags:
        - Products
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: laborRateTableId
          required: false
          schema:
            type: string
          description: Filter products by labor rate table id
        - in: query
          name: laborRateId
          required: false
          schema:
            type: string
          description: Filter products by labor rate id
      responses:
        '200':
          description: Authorized product list
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - meta
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
                  meta:
                    type: object
                    required:
                      - source
                      - laborRateTables
                      - materialTypes
                    properties:
                      source:
                        type: string
                        enum: [cache, upstream]
                      laborRateTables:
                        type: array
                        items:
                          $ref: '#/components/schemas/LaborRateTable'
                      materialTypes:
                        type: array
                        items:
                          $ref: '#/components/schemas/MaterialType'
        '401':
          description: Missing or invalid credential
        '403':
          description: Company inactive or key revoked
        '429':
          description: Rate limit exceeded
        '503':
          description: Remote catalog unavailable and no valid cache exists
  /api/v1/companyid:
    get:
      summary: List the authenticated company catalog with company-scoped stock and costs
      tags:
        - Products
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: laborRateTableId
          required: false
          schema:
            type: string
          description: Filter products by labor rate table id
        - in: query
          name: laborRateId
          required: false
          schema:
            type: string
          description: Filter products by labor rate id
      responses:
        '200':
          description: Authorized company catalog with consolidated inventory context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyCatalogResponse'
        '401':
          description: Missing or invalid credential
        '403':
          description: Company inactive or key revoked
        '429':
          description: Rate limit exceeded
        '503':
          description: Remote catalog unavailable and no valid cache exists
  /api/v1/media/object/{storageKey}:
    get:
      summary: Stream one stable media object by storage key
      tags:
        - Product Media
      parameters:
        - in: path
          name: storageKey
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Media object streamed successfully
        '400':
          description: Invalid storage key
        '404':
          description: Media object not found
        '502':
          description: Media origin unavailable
        '503':
          description: Media origin is not configured
  /api/v1/my-inventory:
    get:
      summary: List the authenticated partner inventory
      tags:
        - Partner Inventory
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Effective partner inventory
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - meta
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PartnerInventoryItem'
                  meta:
                    type: object
                    required:
                      - count
                      - companyId
                    properties:
                      count:
                        type: integer
                      companyId:
                        type: string
        '401':
          description: Missing or invalid credential
        '403':
          description: Company inactive or key revoked
        '429':
          description: Rate limit exceeded
    post:
      summary: Sync one or more partner stock quantities
      tags:
        - Partner Inventory
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartnerInventorySyncRequest'
      responses:
        '200':
          description: Partner stock synchronized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerInventorySyncResponse'
        '400':
          description: Invalid sync payload
        '401':
          description: Missing or invalid credential
        '403':
          description: Company inactive or key revoked
        '429':
          description: Rate limit exceeded
  /api/v1/my-inventory/{productId}:
    patch:
      summary: Update the authenticated partner stock for one product
      tags:
        - Partner Inventory
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - custom_stock_quantity
              properties:
                custom_stock_quantity:
                  type: integer
                  minimum: 0
      responses:
        '200':
          description: Partner stock updated
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/PartnerInventoryItem'
        '401':
          description: Missing or invalid credential
        '403':
          description: Company inactive or key revoked
        '404':
          description: Product not found in the authenticated partner inventory
  /api/internal/webhooks/supabase-sync:
    post:
      summary: Synchronize the local master catalog from Supabase
      tags:
        - Internal Webhooks
      security:
        - webhookSecret: []
      responses:
        '200':
          description: Master catalog synchronized
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: object
                    required:
                      - syncedCount
                      - updatedAt
                    properties:
                      syncedCount:
                        type: integer
                      updatedAt:
                        type: string
                        format: date-time
        '401':
          description: Invalid webhook secret
  /api/internal/admin/companies:
    get:
      summary: List companies for the Super Admin dashboard
      tags:
        - Internal Admin
      security:
        - adminToken: []
      responses:
        '200':
          description: Company list with API key counters
    post:
      summary: Create a company from the Super Admin dashboard
      tags:
        - Internal Admin
      security:
        - adminToken: []
      responses:
        '201':
          description: Company created
  /api/internal/admin/cost-settings:
    get:
      summary: Read the persisted cost settings used in product pricing
      tags:
        - Internal Admin
      security:
        - adminToken: []
      responses:
        '200':
          description: Current cost settings
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/CostSettings'
  /api/internal/admin/cost-settings/history:
    get:
      summary: List the full history of persisted cost setting changes
      tags:
        - Internal Admin
      security:
        - adminToken: []
      responses:
        '200':
          description: Cost setting history
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CostSettingsHistoryEntry'
    patch:
      summary: Update the persisted cost settings used by the API cost calculation
      tags:
        - Internal Admin
      security:
        - adminToken: []
      responses:
        '200':
          description: Updated cost settings
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/CostSettings'
  /api/internal/admin/companies/{companyId}:
    patch:
      summary: Update the selected company settings
      tags:
        - Internal Admin
      security:
        - adminToken: []
      parameters:
        - in: path
          name: companyId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Company updated
        '404':
          description: Company not found
  /api/internal/admin/companies/{companyId}/api-keys:
    get:
      summary: List API keys for a specific company
      tags:
        - Internal Admin
      security:
        - adminToken: []
      parameters:
        - in: path
          name: companyId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: API key list
  /api/internal/admin/companies/{companyId}/status:
    patch:
      summary: Activate or deactivate a company from the internal admin panel
      tags:
        - Internal Admin
      security:
        - adminToken: []
      parameters:
        - in: path
          name: companyId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Company status updated
  /api/internal/admin/companies/{companyId}/inventory:
    get:
      summary: List the master catalog with the custom stock for one company
      tags:
        - Internal Admin
      security:
        - adminToken: []
      parameters:
        - in: path
          name: companyId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Company inventory for the Super Admin
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - meta
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PartnerInventoryItem'
                  meta:
                    type: object
                    required:
                      - count
                      - companyId
                      - companyName
                    properties:
                      count:
                        type: integer
                      companyId:
                        type: string
                      companyName:
                        type: string
  /api/internal/admin/companies/{companyId}/inventory/{productId}:
    put:
      summary: Update the custom stock for a company and product
      tags:
        - Internal Admin
      security:
        - adminToken: []
      parameters:
        - in: path
          name: companyId
          required: true
          schema:
            type: string
        - in: path
          name: productId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - customStockQuantity
              properties:
                customStockQuantity:
                  type: integer
                  minimum: 0
      responses:
        '200':
          description: Company inventory updated
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/PartnerInventoryItem'
        '404':
          description: Company or product not found
  /api/internal/admin/api-keys:
    post:
      summary: Issue a new API key from the internal admin panel
      tags:
        - Internal Admin
      security:
        - adminToken: []
      responses:
        '201':
          description: API key issued
  /api/internal/admin/api-keys/{apiKeyId}/revoke:
    patch:
      summary: Revoke an API key from the internal admin panel
      tags:
        - Internal Admin
      security:
        - adminToken: []
      parameters:
        - in: path
          name: apiKeyId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: API key revoked
  /admin/companies:
    post:
      summary: Create a company
      tags:
        - Admin
      responses:
        '201':
          description: Company created
    get:
      summary: List companies
      tags:
        - Admin
      responses:
        '200':
          description: Company list
  /admin/companies/{companyId}/status:
    patch:
      summary: Activate or deactivate a company
      tags:
        - Admin
      parameters:
        - in: path
          name: companyId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Company status updated
  /admin/api-keys:
    post:
      summary: Issue a new API key
      tags:
        - Admin
      responses:
        '201':
          description: API key issued
  /admin/api-keys/{apiKeyId}/revoke:
    patch:
      summary: Revoke an API key
      tags:
        - Admin
      parameters:
        - in: path
          name: apiKeyId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: API key revoked
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
    adminToken:
      type: apiKey
      in: header
      name: x-admin-token
    webhookSecret:
      type: apiKey
      in: header
      name: x-webhook-secret
  schemas:
    CompanyCatalogResponse:
      type: object
      required:
        - company
        - data
        - meta
      properties:
        company:
          $ref: '#/components/schemas/CompanyCatalogCompany'
        data:
          type: array
          items:
            $ref: '#/components/schemas/CompanyScopedProduct'
        meta:
          type: object
          required:
            - source
            - count
            - companyId
            - companyExternalCode
            - companyName
            - laborRateTables
            - materialTypes
          properties:
            source:
              type: string
              enum: [cache, upstream]
            stale:
              type: boolean
            count:
              type: integer
            companyId:
              type: string
            companyExternalCode:
              type: string
            companyName:
              type: string
            laborRateTables:
              type: array
              items:
                $ref: '#/components/schemas/LaborRateTable'
            materialTypes:
              type: array
              items:
                $ref: '#/components/schemas/MaterialType'
    CompanyCatalogCompany:
      type: object
      required:
        - id
        - company_id
        - companyId
        - legal_name
        - legalName
        - external_code
        - externalCode
        - company_name
        - companyName
        - is_active
        - isActive
        - sync_store_inventory
        - syncStoreInventory
        - api_key_count
        - apiKeyCount
        - active_key_count
        - activeKeyCount
      properties:
        id:
          type: string
        company_id:
          type: string
        companyId:
          type: string
        legal_name:
          type: string
        legalName:
          type: string
        external_code:
          type: string
        externalCode:
          type: string
        company_name:
          type: string
        companyName:
          type: string
        is_active:
          type: boolean
        isActive:
          type: boolean
        sync_store_inventory:
          type: boolean
        syncStoreInventory:
          type: boolean
        api_key_count:
          type: integer
        apiKeyCount:
          type: integer
        active_key_count:
          type: integer
        activeKeyCount:
          type: integer
        created_at:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
    Product:
      type: object
      required:
        - media_assets
        - mediaAssets
        - media_urls
        - mediaUrls
        - main_image_url
        - mainImageUrl
        - variant_count
        - variantCount
        - variants
        - id
        - product_id
        - code
        - sku
        - name
        - serialNumber
        - availableQuantity
      properties:
        media_assets:
          type: array
          items:
            $ref: '#/components/schemas/ProductMediaAsset'
        mediaAssets:
          type: array
          items:
            $ref: '#/components/schemas/ProductMediaAsset'
        media_urls:
          type: array
          items:
            type: string
        mediaUrls:
          type: array
          items:
            type: string
        main_image_url:
          type: string
          nullable: true
        mainImageUrl:
          type: string
          nullable: true
        variant_count:
          type: integer
        variantCount:
          type: integer
        variants:
          type: array
          items:
            $ref: '#/components/schemas/ProductVariant'
        id:
          type: string
        product_id:
          type: string
        code:
          type: string
        sku:
          type: string
        numero_serie:
          type: string
        name:
          type: string
        nome:
          type: string
        serialNumber:
          type: string
        description:
          type: string
          nullable: true
        descricao:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        categoria:
          type: string
          nullable: true
        subcategory:
          type: string
          nullable: true
        subcategoria:
          type: string
          nullable: true
        material:
          type: string
          nullable: true
        baseMaterial:
          type: string
          nullable: true
        material_base:
          type: string
          nullable: true
        purity:
          type: string
